<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 & 맞추기 전체보기 | QuizRank</title>
    <meta name="description" content="모든 AI 기반 트렌드 퀴즈와 맞추기를 확인해보세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7525260897274073"
        crossorigin="anonymous"></script>
    <!-- Favicon (Browser Tab Icon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"
                style="text-decoration: none; color: inherit;">QuizRank<span>.io</span></a></div>
        <nav class="nav-links">
            <a href="quiz-list.html">🎵 오늘의 퀴즈</a>
            <a href="worldcup-list.html">🏆 이상형 월드컵</a>
            <a href="tier-list.html">🏅 티어 리스트</a>
        </nav>
        <div class="actions">
            <div class="theme-switch-wrapper">
                <span class="theme-icon">☀️</span>
                <label class="theme-switch" for="theme-toggle">
                    <input type="checkbox" id="theme-toggle">
                    <div class="slider"></div>
                </label>
                <span class="theme-icon">🌙</span>
            </div>
            <button class="btn-primary" onclick="location.href='login.html'">로그인</button>
        </div>
    </header>

    <!-- Top Ad Placeholder -->
    <div class="ad-placeholder top-ad">
        <span>Google AdSense (Top)</span>
    </div>

    <main class="container">
        <!-- Main Content Layout -->
        <div class="content-layout">
            <!-- Left Ad Placeholder -->
            <aside class="ad-placeholder side-ad left-ad">
                <span>AdSense<br>(Left)</span>
            </aside>

            <div class="main-sections">
                <!-- 통합 검색 바 (Global Search) -->
                <div class="search-container" style="margin-bottom: 2.5rem; position: relative;">
                    <input type="text" id="global-search" placeholder="J-POP, 애니, 빌보드 등 노래와 월드컵을 검색해보세요!"
                        style="width: 100%; padding: 1.2rem 2rem; font-size: 1.1rem; border-radius: 50px; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color); box-shadow: var(--shadow); transition: border-color 0.2s; outline: none;">
                    <span
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 1.5rem; pointer-events: none; opacity: 0.7;">🔍</span>
                </div>

                <!-- Section: 맞추기 부분 전체 리스트 -->
                <section id="quiz" class="category-section">
                    <div class="section-header">
                        <h2>🎵 노래 &amp; 퀴즈 맞추기 전체보기</h2>
                    </div>

                    <!-- 정렬 버튼 -->
                    <div id="sort-bar" style="display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem;">
                        <button id="sort-rank" class="sort-btn active-sort" onclick="applySortQuiz('rank')"
                            style="padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.95rem; font-weight: 700; border: 2px solid var(--primary-color); background: var(--primary-color); color: #fff; cursor: pointer; transition: all 0.2s;">🔥
                            인기순</button>
                        <button id="sort-latest" class="sort-btn" onclick="applySortQuiz('latest')"
                            style="padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.95rem; font-weight: 700; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color); cursor: pointer; transition: all 0.2s;">🆕
                            최신순</button>
                        <button id="sort-correct-desc" class="sort-btn" onclick="applySortQuiz('correct_desc')"
                            style="padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.95rem; font-weight: 700; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color); cursor: pointer; transition: all 0.2s;">✅
                            정답률 높은 순</button>
                        <button id="sort-correct-asc" class="sort-btn" onclick="applySortQuiz('correct_asc')"
                            style="padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.95rem; font-weight: 700; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color); cursor: pointer; transition: all 0.2s;">😤
                            정답률 낮은 순</button>
                    </div>

                    <!-- grid가 5개를 넘어갈 때 줄바꿈이 되도록, 사실 기본적으로 CSS 그리드가 알아서 wrap 해줌 -->
                    <div class="card-grid" id="daily-quiz-grid"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;">
                        <p style="color: var(--text-muted); padding: 1rem;">퀴즈 데이터를 불러오는 중입니다...</p>
                    </div>
                </section>

                <script>
                    // Sort button handler for quiz-list page
                    function applySortQuiz(sort) {
                        // Update active button style
                        document.querySelectorAll('.sort-btn').forEach(function (btn) {
                            btn.style.background = 'var(--card-bg)';
                            btn.style.color = 'var(--text-color)';
                            btn.style.borderColor = 'var(--border-color)';
                        });
                        var activeMap = {
                            'rank': 'sort-rank',
                            'latest': 'sort-latest',
                            'correct_desc': 'sort-correct-desc',
                            'correct_asc': 'sort-correct-asc'
                        };
                        var activeBtn = document.getElementById(activeMap[sort]);
                        if (activeBtn) {
                            activeBtn.style.background = 'var(--primary-color)';
                            activeBtn.style.color = '#fff';
                            activeBtn.style.borderColor = 'var(--primary-color)';
                        }
                        // Call the sortQuizzes function exposed by app.js
                        if (window.sortQuizzes) window.sortQuizzes(sort);
                    }
                </script>

            </div>

            <!-- Right Ad Placeholder -->
            <aside class="ad-placeholder side-ad right-ad">
                <span>AdSense<br>(Right)</span>
            </aside>
        </div>
    </main>

    <!-- Bottom Ad Placeholder -->
    <div class="ad-placeholder bottom-ad">
        <span>Google AdSense (Bottom)</span>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 QuizRank.io. All rights reserved.</p>
            <div class="footer-links">
                <a href="terms.html">이용약관</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="ad-inquiry.html">광고 문의</a>
            </div>
        </div>
    </footer>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="app.js"></script>
</body>

</html>
