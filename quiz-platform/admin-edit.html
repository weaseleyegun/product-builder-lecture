<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 편집 | QuizRank Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"
                style="text-decoration: none; color: inherit;">Quiz-Rank<span>.com</span></a></div>
        <nav class="nav-links">
            <a href="admin-dashboard.html">🛠️ 목록으로 돌아가기</a>
        </nav>
        <div class="actions">
            <button class="btn-primary" onclick="location.href='admin-dashboard.html'">취소하고 나가기</button>
        </div>
    </header>

    <main class="container" style="max-width: 800px; padding: 2rem;">
        <div class="admin-header"
            style="margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem;">
            <h2>✍️ 콘텐츠 정보 편집</h2>
            <p style="color: var(--text-muted);">제목, 설명, 썸네일을 직접 수정하세요. 수정 즉시 서비스에 반영됩니다.</p>
        </div>

        <form id="admin-edit-form" class="admin-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <!-- Title -->
            <div class="form-group">
                <label for="edit-title" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">콘텐츠 제목</label>
                <input type="text" id="edit-title" required placeholder="제목을 입력하세요"
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="edit-description" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">상세
                    설명</label>
                <textarea id="edit-description" rows="4" placeholder="설명을 입력하세요"
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);"></textarea>
            </div>

            <!-- Hashtags -->
            <div class="form-group">
                <label class="form-label"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: 600;">
                    <span>🏷️ 해시태그 (#) <small
                            style="font-weight: 400; color: var(--text-muted); margin-left: 0.5rem;">(최대
                            5개)</small></span>
                    <span id="hashtag-count" style="font-size: 0.8rem; color: var(--text-muted);">0 / 5</span>
                </label>
                <input type="text" id="hashtag-input" class="form-input" placeholder="태그를 입력하고 엔터를 눌러주세요 (예: 케이팝)"
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
                <div id="hashtag-list" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem;"></div>
            </div>

            <!-- Thumbnail & Preview with Drag & Drop -->
            <style>
                .drop-zone {
                    width: 100%;
                    height: 200px;
                    padding: 25px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                    cursor: pointer;
                    color: var(--text-muted);
                    border: 2px dashed var(--border-color);
                    border-radius: 12px;
                    transition: all 0.2s;
                    background: rgba(255, 255, 255, 0.02);
                    position: relative;
                    overflow: hidden;
                }

                .drop-zone--over {
                    border-style: solid;
                    border-color: var(--primary-color);
                    background: rgba(var(--primary-rgb), 0.1);
                }

                .drop-zone__thumb {
                    width: 100%;
                    height: 100%;
                    border-radius: 10px;
                    overflow: hidden;
                    background-color: #333;
                    background-size: cover;
                    background-position: center;
                    position: absolute;
                    top: 0;
                    left: 0;
                    z-index: 1;
                }

                .hashtag-badge {
                    background: var(--primary-color);
                    color: white;
                    padding: 0.3rem 0.8rem;
                    border-radius: 20px;
                    font-size: 0.85rem;
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                }

                .hashtag-badge .remove {
                    cursor: pointer;
                    font-weight: bold;
                }
            </style>
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">🖼️ 썸네일 이미지</label>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem;">
                    이미지를 드래그하거나 클릭하여 업로드하세요. (URL 직접 입력도 가능합니다)
                </p>
                <div class="drop-zone" id="thumb-drop-zone">
                    <span class="drop-zone__prompt">이미지 파일을 드롭하거나 클릭하여 선택</span>
                    <input type="file" id="thumb-file-input" style="display: none;" accept="image/*">
                </div>
                <input type="text" id="edit-thumbnail" placeholder="또는 직접 이미지 주소(URL)를 입력하세요"
                    style="width: 100%; margin-top: 1rem; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
            </div>

            <!-- Submit Button -->
            <div class="form-actions"
                style="margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <button type="submit" class="btn-primary"
                    style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 12px; font-weight: 800;">
                    저장하기
                </button>
            </div>
        </form>
    </main>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
