<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | QuizRank.io</title>
    <meta name="description" content="QuizRank에 로그인하고 포인트를 적립하세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Supabase JS (needed for login) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7525260897274073"
        crossorigin="anonymous"></script>
    <!-- Favicon (Browser Tab Icon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .btn-google {
            background: #fff;
            color: #000;
            border: 1px solid #ddd;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-google:hover {
            background: #f8f8f8;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"
                style="text-decoration: none; color: inherit;">QuizRank<span>.io</span></a></div>
        <div class="actions">
            <div class="theme-switch-wrapper">
                <span class="theme-icon">☀️</span>
                <label class="theme-switch" for="theme-toggle">
                    <input type="checkbox" id="theme-toggle">
                    <div class="slider"></div>
                </label>
                <span class="theme-icon">🌙</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <h1>환영합니다!</h1>
            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" id="login-email" class="form-input" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input type="password" id="login-password" class="form-input" placeholder="••••••••">
            </div>
            <button id="login-btn" class="btn-primary large" style="width: 100%;">이메일로 로그인</button>

            <div class="divider">또는</div>

            <button class="btn-primary large btn-google" onclick="alert('구글 소셜 로그인 연동 예정입니다.')">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M17.64 9.204c0-.638-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
                        fill="#EA4335" />
                </svg>
                Google 계정으로 로그인 (준비중)
            </button>

            <script>
                // Use Supabase JS for real authentication
                document.addEventListener('DOMContentLoaded', function () {
                    // Load Supabase config dynamically from the worker API
                    fetch('/api/config').then(r => r.json()).then(function (cfg) {
                        const sbClient = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

                        document.getElementById('login-btn').addEventListener('click', async function () {
                            const email = document.getElementById('login-email').value.trim();
                            const password = document.getElementById('login-password').value;

                            if (!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');

                            const btn = document.getElementById('login-btn');
                            btn.disabled = true;
                            btn.textContent = '로그인 중...';

                            try {
                                const { data, error } = await sbClient.auth.signInWithPassword({ email, password });

                                if (error) {
                                    alert('로그인 실패: ' + error.message);
                                    return;
                                }

                                // Store JWT in sessionStorage (auto-clears when tab/browser closes)
                                sessionStorage.setItem('sb_access_token', data.session.access_token);
                                sessionStorage.setItem('sb_user_email', data.user.email);

                                // Legacy flag (now secondary – real check is the JWT)
                                localStorage.setItem('isAdmin', 'true');

                                alert('로그인되었습니다.');
                                location.href = 'admin-dashboard.html';
                            } catch (e) {
                                alert('오류가 발생했습니다: ' + e.message);
                            } finally {
                                btn.disabled = false;
                                btn.textContent = '이메일로 로그인';
                            }
                        });
                    }).catch(function () {
                        // Fallback: if config API is unreachable (local dev without wrangler)
                        document.getElementById('login-btn').addEventListener('click', function () {
                            alert('API 서버(wrangler dev)가 실행 중인지 확인해주세요.');
                        });
                    });
                });
            </script>
        </div>
    </main>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
</body>

</html>
