<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Quiz-Rank.com</title>
    <meta name="description" content="QuizRank에 로그인하고 포인트를 적립하세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Load config first so API_BASE_URL is available to inline scripts -->
    <script src="js/utils/config.js"></script>
    <!-- Supabase JS (needed for login) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <meta name="google-adsense-account" content="ca-pub-7525260897274073">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7525260897274073"
        crossorigin="anonymous"></script>
    <!-- Favicon (Browser Tab Icon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .btn-google {
            background: #fff;
            color: #000;
            border: 1px solid #ddd;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-google:hover {
            background: #f8f8f8;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"
                style="text-decoration: none; color: inherit;">Quiz-Rank<span>.com</span></a></div>
        <div class="actions">
            
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <h1>환영합니다!</h1>
            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" id="login-email" class="form-input" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input type="password" id="login-password" class="form-input" placeholder="••••••••">
            </div>
            <button id="login-btn" class="btn-primary large" style="width: 100%;">이메일로 로그인</button>

            <a href="signup.html"
                style="display: block; margin-top: 1.5rem; color: var(--primary-color); text-decoration: none; font-size: 0.95rem;">계정이
                없으신가요? 회원가입</a>

            <script>
                // Supabase auth login
                document.addEventListener('DOMContentLoaded', function () {
                    // config.js already loaded: API_BASE_URL points to correct Worker
                    fetch(API_BASE_URL + '/api/config')
                        .then(r => r.json())
                        .then(function (cfg) {
                            const sbClient = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

                            document.getElementById('login-btn').addEventListener('click', async function () {
                                const email = document.getElementById('login-email').value.trim();
                                const password = document.getElementById('login-password').value;

                                if (!email || !password) return alert('이메일과 비밀번호를 입력해주세요.');

                                const btn = document.getElementById('login-btn');
                                btn.disabled = true;
                                btn.textContent = '로그인 중...';

                                try {
                                    const { data, error } = await sbClient.auth.signInWithPassword({ email, password });

                                    if (error) {
                                        alert('로그인 실패: ' + error.message);
                                        return;
                                    }

                                    // Store JWT in sessionStorage (clears when tab/browser closes)
                                    sessionStorage.setItem('sb_access_token', data.session.access_token);
                                    sessionStorage.setItem('sb_user_email', data.user.email);
                                    localStorage.setItem('isAdmin', 'true');

                                    location.href = 'admin-dashboard.html';
                                } catch (e) {
                                    alert('오류가 발생했습니다: ' + e.message);
                                } finally {
                                    btn.disabled = false;
                                    btn.textContent = '이메일로 로그인';
                                }
                            });
                        })
                        .catch(function (e) {
                            console.error('Config fetch failed:', e);
                            document.getElementById('login-btn').addEventListener('click', function () {
                                alert('API 서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
                            });
                        });
                });
            </script>
        </div>
    </main>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
</body>

</html>
