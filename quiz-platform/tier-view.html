    <style>
        .tier-list-container {
            width: 100%;
            margin: 2rem auto;
        }

        .tier-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .tier-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--primary-color), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tier-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .tier-list-board {
            background-color: #1a1a1a;
            border: 2px solid #000;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tier-row {
            display: flex;
            border-bottom: 2px solid #000;
            min-height: 100px;
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            text-shadow: none;
            flex-shrink: 0;
            border-right: 2px solid #000;
        }

        .tier-s {
            background-color: #ff7f7f;
        }

        .tier-a {
            background-color: #ffbf7f;
        }

        .tier-b {
            background-color: #ffff7f;
        }

        .tier-c {
            background-color: #7fff7f;
        }

        .tier-d {
            background-color: #7fbfff;
        }

        .tier-items {
            display: flex;
            flex-wrap: wrap;
            padding: 4px;
            gap: 4px;
            width: 100%;
            background-color: #1a1a1a;
        }

        .tier-item {
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tier-item:hover {
            opacity: 0.8;
            border-color: rgba(255, 255, 255, 0.5);
        }



        .tier-item-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        .tier-item-placeholder {
            font-size: 2rem;
            opacity: 0.5;
        }

        .tier-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .image-pool {
            display: flex;
            flex-wrap: wrap;
            padding: 1rem;
            gap: 4px;
            width: 100%;
            background-color: #1a1a1a;
            border: 2px solid #000;
            border-radius: 4px;
            min-height: 200px;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pool-header {
            width: 100%;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--secondary-color);
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .tier-items.drag-over,
        .image-pool.drag-over {
            background-color: rgba(255, 255, 255, 0.05);
            outline: 2px dashed var(--primary-color);
            outline-offset: -2px;
        }

        @media (max-width: 768px) {
            .tier-row {
                flex-direction: column;
            }

            .tier-label {
                width: 100%;
                height: 50px;
                font-size: 1.5rem;
                padding: 0.5rem;
                border-right: none;
                border-bottom: 2px solid #000;
            }
        }
    </style>
</head>

<body>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/seo.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tierId = urlParams.get('id');

            if (!tierId) {
                alert('잘못된 접근입니다.');
                location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/worldcup-play?id=${tierId}`);
                if (!response.ok) throw new Error('데이터를 불러오는데 실패했습니다.');

                const data = await response.json();
                const tierInfo = data.worldcup;
                const items = data.items;

                // Update Header
                document.querySelector('.tier-header h1').textContent = tierInfo.title;
                document.querySelector('.tier-header p').textContent = tierInfo.description || '최고의 티어를 직접 정해보세요!';

                // Update SEO
                if (window.updateSEO) {
                    window.updateSEO({
                        title: `${tierInfo.title} | QuizRank.io`,
                        description: tierInfo.description || `${tierInfo.title} 티어 리스트를 확인하고 직접 만들어보세요.`
                    });
                }

                // Render Image Pool
                const pool = document.getElementById('image-pool');
                // Clear existing hardcoded items (except header)
                while (pool.children.length > 1) {
                    pool.removeChild(pool.lastChild);
                }

                items.forEach((item, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'tier-item';
                    itemDiv.draggable = true;
                    itemDiv.id = `item-${item.id}`;

                    if (item.image_url) {
                        itemDiv.style.backgroundImage = `url('${item.image_url}')`;
                    } else {
                        // Fallback: Show first character if no image
                        itemDiv.style.backgroundColor = '#333';
                        itemDiv.innerHTML = `<span class="tier-item-placeholder">${item.name.charAt(0)}</span>`;
                    }

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'tier-item-name';
                    nameDiv.textContent = item.name;
                    itemDiv.appendChild(nameDiv);

                    pool.appendChild(itemDiv);
                });

                // Initialize Drag & Drop after rendering
                initializeDragAndDrop();

            } catch (error) {
                console.error('Error:', error);
                document.querySelector('.tier-header h1').textContent = '데이터를 찾을 수 없습니다.';
            }
        });

        function initializeDragAndDrop() {
            const draggables = document.querySelectorAll('.tier-item');
            const dropZones = document.querySelectorAll('.tier-items, .image-pool');

            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', () => {
                    draggable.classList.add('dragging');
                });

                draggable.addEventListener('dragend', () => {
                    draggable.classList.remove('dragging');
                    dropZones.forEach(zone => zone.classList.remove('drag-over'));
                });
            });

            dropZones.forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    const draggable = document.querySelector('.dragging');
                    if (draggable) {
                        zone.classList.add('drag-over');
                    }
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const draggable = document.querySelector('.dragging');
                    if (draggable) {
                        zone.appendChild(draggable);
                    }
                });
            });
        }
    </script>
</body>
