<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 만들기 | QuizRank.io</title>
    <meta name="description" content="나만의 퀴즈를 만들어 친구들과 대결해보세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7525260897274073"
        crossorigin="anonymous"></script>
    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>">
    <style>
        .create-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-weight: 800;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .question-card {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .question-number {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .remove-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff4757;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .question-card.invalid-url {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.05);
        }

        .url-status {
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: none;
        }

        .url-status.error {
            color: #ff4757;
            display: block;
        }

        .url-status.success {
            color: #2ed573;
            display: block;
        }

        /* Drag & Drop Area */
        .drop-zone {
            width: 100%;
            height: 200px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .drop-zone--over {
            border-style: solid;
            border-color: var(--primary-color);
            background: rgba(var(--primary-rgb), 0.1);
        }

        .drop-zone__thumb {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #333;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .drop-zone__input {
            display: none;
        }

        /* Hashtag styling */
        .hashtag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .hashtag-badge {
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hashtag-badge .remove {
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"
                style="text-decoration: none; color: inherit;">QuizRank<span>.io</span></a></div>
        <div class="actions">
            
            <button class="btn-primary" onclick="location.href='login.html'">로그인</button>
        </div>
    </header>

    <main class="container">
        <div class="create-container">
            <h1 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">나만의 퀴즈 만들기 🎁</h1>
            <p style="text-align: center; margin-bottom: 2rem; color: var(--text-muted);">유튜브 영상 링크나 이미지 링크를 활용해 객관식 퀴즈를
                쉽게 생성하세요!</p>

            <div class="form-group">
                <label class="form-label">🔥 퀴즈 제목</label>
                <input type="text" id="quiz-title" class="form-input" placeholder="예: 2000년대 명곡 모음집 (어려움)">
            </div>

            <div class="form-group">
                <label class="form-label">📝 퀴즈 설명</label>
                <textarea id="quiz-desc" class="form-input" rows="3" placeholder="퀴즈에 대한 짧은 설명을 적어주세요."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>🏷️ 해시태그 (#) <small style="font-weight: 400; color: var(--text-muted); opacity: 0.7;">(최대
                            5개)</small></span>
                    <span id="hashtag-count" style="font-size: 0.8rem; color: var(--text-muted);">0 / 5</span>
                </label>
                <input type="text" id="hashtag-input" class="form-input" placeholder="태그를 입력하고 엔터를 눌러주세요 (예: 케이팝)">
                <div id="hashtag-list" class="hashtag-container"></div>
            </div>

            <div class="form-group">
                <label class="form-label">🖼️ 썸네일 이미지 (선택)</label>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem;">
                    이미지를 드래그하거나 클릭하여 업로드하세요. <br>
                    <span style="color: var(--accent);">* 설정을 생략하면 '문제 1번'의 미디어가 썸네일로 자동 지정됩니다.</span>
                </p>
                <div class="drop-zone" id="thumb-drop-zone">
                    <span class="drop-zone__prompt">이미지 파일을 드롭하거나 클릭하여 선택 (또는 이미지 URL 붙여넣기)</span>
                    <input type="file" name="myFile" class="drop-zone__input" id="thumb-file-input" accept="image/*">
                </div>
                <input type="text" id="quiz-thumbnail-url" class="form-input" style="margin-top: 0.5rem;"
                    placeholder="또는 직접 이미지 주소(URL)를 입력하세요.">
            </div>

            <div id="questions-container">
                <!-- Question cards will be injected here -->
            </div>

            <button class="btn-primary"
                style="width: 100%; margin-bottom: 1rem; background: var(--card-bg); color: var(--text-color); border: 2px dashed var(--border-color);"
                onclick="addQuestion()">+ 문제 추가하기</button>

            <button class="btn-primary large" style="width: 100%; margin-top: 2rem;" onclick="submitQuiz()">🚀 퀴즈 최종 만들기
                (저장)</button>
        </div>
    </main>

    <script src="js/utils/config.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/quiz-create.js"></script>
</body>

</html>
